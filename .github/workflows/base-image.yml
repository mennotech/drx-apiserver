# Build, security-scan, and release the reusable drx-drupal-base image.
#
# Tag conventions (see base/README.md):
#   - Push to main         -> publish "edge"
#   - Tag vX.Y.Z           -> publish "X.Y.Z", "X.Y", "X", "latest"
#   - Tag vX.Y.Z-rcN       -> publish "X.Y.Z-rcN" only (no floating tags)
#
# Required repo permissions: contents:read, packages:write, id-token:write
# (for SLSA provenance attestation), security-events:write (for scan SARIF).
name: base-image

on:
  push:
    branches: [main]
    paths:
      - 'base/**'
      - '.github/workflows/base-image.yml'
  pull_request:
    paths:
      - 'base/**'
      - '.github/workflows/base-image.yml'
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/drx-drupal-base

jobs:
  build:
    name: build / scan / publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref, '-') }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !contains(github.ref, '-') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=drx-drupal-base
            org.opencontainers.image.description=Reusable Drupal 10 base image for decoupled API backends.
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=GPL-2.0-or-later

      - name: Build (load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: ./base
          file: ./base/Dockerfile
          load: true
          tags: drx-drupal-base:ci
          build-args: |
            DRX_BASE_VERSION=${{ steps.meta.outputs.version }}
            DRX_BASE_VCS_REF=${{ github.sha }}
            DRX_BASE_BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke boot
        run: |
          docker run --rm -d --name drx-smoke \
            -e DRUPAL_ADMIN_PASS=ci-smoke-password \
            -p 8080:80 drx-drupal-base:ci
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/user/login_status?_format=json >/dev/null; then
              echo "smoke ok after ${i}s"; exit 0
            fi
            sleep 2
          done
          echo "smoke failed; container logs:"
          docker logs drx-smoke || true
          exit 1
        continue-on-error: false

      - name: Tear down smoke container
        if: always()
        run: docker rm -f drx-smoke || true

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: drx-drupal-base:ci
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy-base-image

      - name: Build & push (multi-arch)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./base
          file: ./base/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          build-args: |
            DRX_BASE_VERSION=${{ steps.meta.outputs.version }}
            DRX_BASE_VCS_REF=${{ github.sha }}
            DRX_BASE_BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
